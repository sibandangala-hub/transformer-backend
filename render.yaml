services:
  - type: web
    name: transformer-pm
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >
      gunicorn app:app
      --bind 0.0.0.0:$PORT
      --workers 1
      --threads 4
      --timeout 120
      --log-level info
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false      # paste the JSON in the Render dashboard → Environment
      - key: PYTHON_VERSION
        value: 3.11.0
